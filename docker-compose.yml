services:
  postgres:
    image: postgres:16-alpine
    container_name: shieldapi-postgres
    environment:
      POSTGRES_DB: shieldapi
      POSTGRES_USER: shield
      POSTGRES_PASSWORD: shield
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shield -d shieldapi"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: shieldapi-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: shieldapi-app
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/shieldapi
      DB_USERNAME: shield
      DB_PASSWORD: shield
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: super-secure-shieldapi-jwt-secret-with-at-least-32-characters
      JWT_EXPIRATION_MS: 3600000
      RATE_LIMIT: 5
      RATE_LIMIT_WINDOW_SECONDS: 60
      RATE_LIMIT_BAN_THRESHOLD: 3
      RATE_LIMIT_BAN_SECONDS: 300
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
