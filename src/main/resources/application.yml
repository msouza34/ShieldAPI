spring:
  application:
    name: ShieldAPI

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/shieldapi}
    username: ${DB_USERNAME:shield}
    password: ${DB_PASSWORD:shield}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms

server:
  port: 8080

app:
  jwt:
    secret: ${JWT_SECRET:replace-this-with-a-very-long-secret-key-with-at-least-32-chars}
    expiration-ms: ${JWT_EXPIRATION_MS:3600000}
  rate-limit:
    limit: ${RATE_LIMIT:5}
    window-seconds: ${RATE_LIMIT_WINDOW_SECONDS:60}
    ban-threshold: ${RATE_LIMIT_BAN_THRESHOLD:3}
    ban-seconds: ${RATE_LIMIT_BAN_SECONDS:300}

logging:
  pattern:
    console: '{"timestamp":"%d{yyyy-MM-dd''T''HH:mm:ss.SSSXXX}","level":"%5p","thread":"%t","logger":"%logger{36}","message":"%m"}%n'

springdoc:
  swagger-ui:
    path: /swagger-ui.html
